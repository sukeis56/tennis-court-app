<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1a">
    <title>Tennis Court Checker</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>Tennis Court Checker</h1>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- モーダル -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()" style="display:none;">
        <div id="modal-content" class="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        function openModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-content').innerHTML = '';
        }

        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id === 'modal-content') {
                openModal();
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
