services:
  - type: web
    name: tennis-court-app
    runtime: docker
    plan: free
    healthCheckPath: /status
    disk:
      name: tennis-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_USER_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
